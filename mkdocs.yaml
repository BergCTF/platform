---
site_name: Berg CTF Platform
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
markdown_extensions:
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true


nav:
  - Home: index.md
  - Configuration: configuration.md
  - Integrations:
    - Discord: Discord.md
  - Guides:
      - Developing Challenges: Challenge.md
      - Metrics Support: Metrics.md
      - OIDC with Authentik: OIDC-Authentik.md
