---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "berg.fullname" . }}-api
  labels:
    {{- include "berg.labels" . | nindent 4 }}
    component: api
spec:
  strategy:
    type: RollingUpdate
  replicas: 1
  selector:
    matchLabels:
      {{- include "berg.selectorLabels" . | nindent 6 }}
      component: api
  template:
    metadata:
      labels:
        {{- include "berg.selectorLabels" . | nindent 8 }}
        component: api
    spec:
      {{ if .Values.berg.pullSecretName }}
      imagePullSecrets:
        - name: {{ .Values.berg.pullSecretName }}
      {{ end }}
      serviceAccountName: {{ include "berg.fullname" . }}
      containers:
        - name: berg-api
          image: "{{ .Values.berg.image.repository }}:{{ .Values.berg.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.berg.image.imagePullPolicy }}
          env:
            - name: "BERG_NAMESPACE"
              value: {{ .Release.Namespace | quote }}
            - name: "BERG_RELEASE"
              value: {{ include "berg.fullname" . | quote }}
            - name: "BERG_VERSION"
              value: {{ .Chart.AppVersion | quote }}
            - name: "ASPNETCORE_URLS"
              value: "http://0.0.0.0:8080"
            - name: "ASPNETCORE_FORWARDEDHEADERS_ENABLED"
              value: "true"
          {{- with .Values.berg.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.berg.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: appsettings
              mountPath: /app/appsettings.json
              subPath: appsettings.json
          resources:
            {{- toYaml .Values.berg.resources | nindent 12 }}
      volumes:
        - name: appsettings
          configMap:
            name: {{ include "berg.fullname" . }}-appsettings
{{ if .Values.frontend.enabled }}
---
apiVersion: apps/v1
kind: Deployment
