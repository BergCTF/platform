spec:
  strategy:
    type: RollingUpdate
  replicas: 1
  selector:
    matchLabels:
      {{- include "berg.selectorLabels" . | nindent 6 }}
      component: frontend
  template:
    metadata:
      labels:
        {{- include "berg.selectorLabels" . | nindent 8 }}
        component: frontend
    spec:
      {{ if .Values.frontend.pullSecretName }}
      imagePullSecrets:
        - name: {{ .Values.frontend.pullSecretName }}
      {{ end }}
      containers:
        - name: berg-frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.frontend.image.imagePullPolicy }}
