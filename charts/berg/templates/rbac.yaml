---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "berg.fullname" . }}-role
  labels:
    {{- include "berg.labels" . | nindent 4 }}
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "berg.fullname" . }}-role-binding
  labels:
    {{- include "berg.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "berg.fullname" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "berg.fullname" . }}-role
  apiGroup: rbac.authorization.k8s.io
