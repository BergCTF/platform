---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "berg.fullname" . }}-web-redirect
  labels:
    {{- include "berg.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name | quote }}
      namespace: {{ .Values.gateway.namespace | quote }}
      sectionName: {{ .Values.gateway.httpListenerName | quote }}
  hostnames:
    - {{ .Values.berg.domain | quote }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
            port: {{ .Values.gateway.httpsPort }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "berg.fullname" . }}-api
  labels:
    {{- include "berg.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name | quote }}
      namespace: {{ .Values.gateway.namespace | quote }}
      sectionName: {{ .Values.gateway.httpsListenerName | quote }}
  hostnames:
    - {{ .Values.berg.domain | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
        - path:
            type: PathPrefix
            value: /swagger
        - path:
            type: Exact
            value: /.well-known/openid-configuration
        - path:
            type: Exact
            value: /.well-known/jwks
      backendRefs:
        - name: "{{ include "berg.fullname" . }}-api"
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "berg.fullname" . }}-chall-http-redirect
spec:
  parentRefs:
    - name: {{ .Values.gateway.name | quote }}
      namespace: {{ .Values.gateway.namespace | quote }}
      sectionName: {{ .Values.gateway.httpRouteRedirectListenerName | quote }}
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
        port: {{ .Values.gateway.httpRoutePort }}
{{- if .Values.frontend.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "berg.fullname" . }}-frontend
  labels:
    {{- include "berg.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name | quote }}
      namespace: {{ .Values.gateway.namespace | quote }}
      sectionName: {{ .Values.gateway.httpsListenerName | quote }}
  hostnames:
    - {{ .Values.berg.domain | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: "{{ include "berg.fullname" . }}-frontend"
          port: 80
{{- end }}
