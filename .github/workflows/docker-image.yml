name: Docker Image CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: "Checkout repository"
      uses: actions/checkout@v3
    - name: "Build and push image" 
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ghcr.io/NoRelect/berg:latest
